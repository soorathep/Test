<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="author" content="{{ site.author }}">
<meta name="theme-color" content="#0E3B5C">
<link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png">

<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
{% if page.layout == 'post' %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:author" content="{{ site.author }}">{% endif %}
<meta property="og:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ '/og.png' | absolute_url }}{% endif %}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ '/og.png' | absolute_url }}{% endif %}">

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ site.baseurl }}/feed.xml">
</head>
<body>

<header class="nav">
  <div class="nav-in">
    <a class="brand" href="{{ site.baseurl }}/{{ site.home_url }}">SKH <span>Research Group</span></a>
    <button class="burger" aria-label="Menu">MENU</button>
    <nav class="nav-links">
      <a href="{{ site.baseurl }}/{{ site.home_url }}#home">Home</a>
      <a href="{{ site.baseurl }}/{{ site.home_url }}#research">Research</a>
      <a href="{{ site.baseurl }}/{{ site.home_url }}#cti">CTI Framework</a>
      <a href="{{ site.baseurl }}/{{ site.home_url }}#facilities">Facilities</a>
      <a href="{{ site.baseurl }}/{{ site.home_url }}#people">People</a>
      <a href="{{ site.baseurl }}/{{ site.home_url }}#publications">Publications</a>
      <a href="{{ site.baseurl }}/{{ site.home_url }}#recognition">Recognition</a>
      <a href="{{ site.baseurl }}/news/">News</a>
      <a href="{{ site.baseurl }}/essays/">Essays</a>
    </nav>
  </div>
</header>

<div class="page on">
  <div class="wrap">
    {{ content }}
  </div>
</div>

<footer style="border-top:1px solid var(--line);padding:34px 0;margin-top:60px">
  <div class="wrap">
    <p style="font-size:.85rem;color:var(--ink-soft)">
      Energy Storage Innovation Laboratory · Department of Chemical Engineering ·
      Chulalongkorn University, Bangkok, Thailand ·
      <a href="{{ site.baseurl }}/feed.xml">RSS</a>
    </p>
  </div>
</footer>

<script>
  var b = document.querySelector('.burger');
  if (b) b.addEventListener('click', function () {
    document.querySelector('.nav-links').classList.toggle('open');
  });
</script>
</body>
</html>
