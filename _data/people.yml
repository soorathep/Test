# Current lab members. One entry per person, in the order they should appear.
#
# Generated by tools/make_people.py from the returned member_form.docx files —
# but it is a plain list, so hand-editing is fine too.
#
# photo:  a square JPEG in img/people/. The site crops to a square and shows it
#         grayscale until hover, so mismatched phone photos still look like a set.
# Omit any optional line you do not have. Do not invent one.

- slug: example-person
  name: Example Person
  role: PhD student
  since: 2024
  topic: One sentence, plain English, no acronyms.
  prev: MSc Chemistry, Some University, 2023      # optional
  photo: example-person.jpg                        # optional — a placeholder shows without it
  link: https://orcid.org/0000-0000-0000-0000      # optional
