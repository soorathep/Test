# Featured Discoveries — the flagship papers, newest first.
# One block per paper. The home page and the Publications page both read this file.
#
# contribution:  ONE sentence, plain, stating what the paper establishes.
# doi:           optional. If present, a "DOI …" link is shown. If omitted,
#                the card shows "DOI forthcoming" with no link — never invent one.
# image:         optional graphical abstract / cover, path relative to site root
#                (e.g. covers/Materials_Horizons_2026.jpg).
# journal, year: as they should be displayed.

- title: "Why ionic conductivity does not predict durability: Coordination–Transport–Interface design rules for sodium batteries across liquid and solid electrolytes"
  journal: Journal of Materials Chemistry A
  year: 2026
  contribution: "Six falsifiable design rules and a minimal descriptor set show that ionic conductivity does not predict lifetime — and that under a matched stack-pressure baseline the usual sulfide-over-oxide ranking can invert."
  doi: 10.1039/D6TA01969B

- title: "Nanoconfinement as an electrolyte-state selector in hard carbon for sodium storage"
  journal: Materials Horizons
  year: 2026
  contribution: "Reframes pore nanoconfinement in hard carbon as an electrolyte-state selector that governs the sodium-storage mechanism, linking coordination environment to achievable capacity."
  image: covers/Materials_Horizons_2026.jpg
  # doi: ADD — Materials Horizons 2026 Opinion

- title: "From molecule to stack: a cross-scale design framework for aqueous organic redox flow batteries"
  journal: Batteries & Supercaps
  year: 2026
  contribution: "A cross-scale framework carrying aqueous organic redox chemistries from the single molecule to the working stack, closing the gap between a molecule that works in a vial and a stack that works in service."
  image: covers/Batteries_and_Supercaps_2026.jpg
