- name: Through the Thinkers
  blurb: The research life seen through the eyes of ten philosophers, scientists, and teachers — from Jung to Confucius.
- name: Beyond Metrics
  blurb: First-person reflections on the parts of an academic life that publications, citations, and the H-index cannot measure.
- name: Lessons from Science
  blurb: Everyday laboratory phenomena — batteries, entropy, interfaces — read as quiet lessons for life.
- name: Letters to My Younger Self
  blurb: Notes sent back to the researcher I was twenty years ago.
- name: The Craft of Research
  blurb: Practical, evergreen guidance on the day-to-day craft — hypotheses, peer review, writing, figures, reproducibility, and integrity.
